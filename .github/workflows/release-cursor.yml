name: Release Cursor (VSIX)

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "src/**"
      - "icons/**"
      - "scripts/package.sh"
      - "scripts/install-vsix.sh"
      - ".vscodeignore"
      - ".github/workflows/release-cursor.yml"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read version
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-v${{ steps.meta.outputs.version }}
          path: dist/kaneo-branches-*.vsix
          if-no-files-found: error

      - name: Ensure release tag on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            CURRENT="$(git rev-parse "$TAG^{commit}")"
            HEAD="$(git rev-parse HEAD)"
            if [[ "$CURRENT" != "$HEAD" ]]; then
              echo "Tag $TAG ya existe en otro commit ($CURRENT). Sube version en package.json."
              exit 1
            fi
            echo "Tag $TAG ya apunta a HEAD."
          else
            git tag -a "$TAG" -m "Release $TAG (Cursor/VS Code)"
            git push origin "$TAG"
          fi

      - name: Publish GitHub Release
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (github.ref == 'refs/heads/main' && github.event_name == 'push')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Cursor/VS Code v${{ steps.meta.outputs.version }}
          files: dist/kaneo-branches-*.vsix
          generate_release_notes: true
          make_latest: true

name: Release Neovim

on:
  push:
    branches: [main]
    paths:
      - "neovim/**"
      - "scripts/package-neovim.sh"
      - "scripts/install-neovim.sh"
      - ".github/workflows/release-neovim.yml"
    tags:
      - "nvim-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          VERSION="$(tr -d '[:space:]' < neovim/VERSION)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=nvim-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          chmod +x scripts/package-neovim.sh
          ./scripts/package-neovim.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaneo-nvim-v${{ steps.meta.outputs.version }}
          path: dist/kaneo-nvim-*.tar.gz
          if-no-files-found: error

      - name: Ensure release tag on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            CURRENT="$(git rev-parse "$TAG^{commit}")"
            HEAD="$(git rev-parse HEAD)"
            if [[ "$CURRENT" != "$HEAD" ]]; then
              echo "Tag $TAG ya existe en otro commit ($CURRENT). Sube neovim/VERSION."
              exit 1
            fi
            echo "Tag $TAG ya apunta a HEAD."
          else
            git tag -a "$TAG" -m "Release $TAG (Neovim)"
            git push origin "$TAG"
          fi

      - name: Publish GitHub Release
        if: |
          startsWith(github.ref, 'refs/tags/nvim-v') ||
          (github.ref == 'refs/heads/main' && github.event_name == 'push')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Neovim v${{ steps.meta.outputs.version }}
          files: dist/kaneo-nvim-*.tar.gz
          generate_release_notes: true
          make_latest: true
